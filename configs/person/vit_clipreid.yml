MODEL:
  PRETRAIN_CHOICE: 'imagenet'
  METRIC_LOSS_TYPE: 'triplet'
  IF_LABELSMOOTH: 'on'
  IF_WITH_CENTER: 'no'
  NAME: 'ViT-B-16'
  STRIDE_SIZE: [16, 16]
  ID_LOSS_WEIGHT : 0.25
  TRIPLET_LOSS_WEIGHT : 1.0
  I2T_LOSS_WEIGHT : 1.0
  QAT:
    # Keep normal FP32 training/checkpoint loading unchanged.  The dedicated
    # quantize_finetune.py launcher enables QAT only after loading FP32 weights.
    ENABLED: False
    VISUAL_ONLY: True
    QUANTIZE_TEXT_ENCODER: False
    QUANTIZE_PATCH_EMBED: False
    QUANTIZE_MLP: True
    QUANTIZE_QKV_PROJ: True
    QUANTIZE_ATTN_OUT_PROJ: True
    QUANTIZE_QK_MATMUL: False
    QUANTIZE_ATTN_PROB: False
    QUANTIZE_AV_MATMUL: False
    EXCLUDE_FIRST_N_BLOCKS: 0
    EXCLUDE_LAST_N_BLOCKS: 2
    WEIGHT_BITS: 8
    ACTIVATION_BITS: 8
    ACTIVATION_OBSERVER: 'moving_average'
    ACTIVATION_PERCENTILE: 99.99
    CALIBRATION_BATCHES: 50
    DISABLE_OBSERVER_EPOCH: 2
    SMOOTHING:
      ENABLED: True
      ALPHA: 0.5
      AUTO_SEARCH: False
    DISTILLATION:
      ENABLED: True
      FEATURE_WEIGHT: 1.0
      RELATION_WEIGHT: 5.0
      DISTANCE_WEIGHT: 0.0
      USE_PRE_BN_FEATURE: True
  # SIE_CAMERA: True
  # SIE_COE : 1.0

INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  PROB: 0.5 # random horizontal flip
  RE_PROB: 0.5 # random erasing
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 4

SOLVER:
  STAGE1:
    IMS_PER_BATCH: 64
    OPTIMIZER_NAME: "Adam"
    BASE_LR: 0.00035
    WARMUP_LR_INIT: 0.00001
    LR_MIN: 1e-6
    WARMUP_METHOD: 'linear'
    WEIGHT_DECAY:  1e-4
    WEIGHT_DECAY_BIAS: 1e-4
    MAX_EPOCHS: 120
    CHECKPOINT_PERIOD: 120
    LOG_PERIOD: 50
    WARMUP_EPOCHS: 5
  
  STAGE2:
    IMS_PER_BATCH: 64
    OPTIMIZER_NAME: "Adam"
    BASE_LR: 0.000005
    WARMUP_METHOD: 'linear'
    WARMUP_ITERS: 10
    WARMUP_FACTOR: 0.1
    WEIGHT_DECAY:  0.0001
    WEIGHT_DECAY_BIAS: 0.0001
    LARGE_FC_LR: False
    MAX_EPOCHS: 40
    CHECKPOINT_PERIOD: 40
    LOG_PERIOD: 50
    EVAL_PERIOD: 40
    BIAS_LR_FACTOR: 2
    
    STEPS: [30, 50]
    GAMMA: 0.1
  
TEST:
  EVAL: True
  IMS_PER_BATCH: 16
  RE_RANKING: False
  WEIGHT: ''
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'

DATASETS:
  # `market1501.py` appends Market-1501-v15.09.15 itself, so this must be the
  # parent folder, not the dataset folder itself.
  NAMES: 'market1501'
  ROOT_DIR: 'C:/Users/Lenovo/Documents'
OUTPUT_DIR: 'output/it_qat'

